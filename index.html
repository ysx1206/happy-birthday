<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐！🎂</title>
<style>
 body {
   margin: 0;
   padding: 0;
   display: flex;
   justify-content: center;
   align-items: center;
   min-height: 100vh;
   background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
   font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
   overflow: hidden;
 }

 .container {
   text-align: center;
   z-index: 2;
   position: relative;
   padding: 20px;
 }

 h1 {
   font-size: 3.5em;
   color: #fff;
   text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
   animation: floatText 2s ease-in-out infinite alternate;
   margin-bottom: 20px;
 }

 .cake {
   font-size: 120px;
   margin: 30px auto;
   cursor: pointer;
   transition: transform 0.3s;
   display: inline-block;
 }

 .cake:active {
   transform: scale(1.1);
 }

 .candles {
   font-size: 60px;
   position: relative;
   top: -20px;
   animation: flicker 0.5s infinite alternate;
 }

 .message {
   font-size: 1.5em;
   color: #fff;
   background: rgba(255, 255, 255, 0.25);
   backdrop-filter: blur(10px);
   border-radius: 20px;
   padding: 15px 30px;
   display: inline-block;
   margin-top: 20px;
   box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
 }

 .confetti {
   position: absolute;
   width: 10px;
   height: 10px;
   border-radius: 50%;
   animation: fall linear forwards;
   z-index: 1;
 }

 @keyframes floatText {
   from { transform: translateY(0px); }
   to { transform: translateY(-10px); }
 }

 @keyframes flicker {
   from { opacity: 0.7; }
   to { opacity: 1; }
 }

 @keyframes fall {
   to {
     transform: translateY(100vh) rotate(360deg);
     opacity: 0;
   }
 }


 .blown {
   filter: grayscale(1);
   transition: all 0.5s;
 }
</style>
</head>
<body>
<div class="container">
 <h1>🎈 生日快乐！</h1>
 <div class="cake" id="cake">
   🎂
   <div class="candles" id="candles">🕯️</div>
 </div>
 <div class="message" id="personalMsg">
   亲爱的zmx，<br>
   xxxxx<br>
   xxxxx<br>
  xxxxx
 </div>
</div>

<script>

 function createConfetti() {
   const confetti = document.createElement('div');
   confetti.className = 'confetti';
   const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'];
   confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
   confetti.style.left = Math.random() * 100 + '%';
   confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
   confetti.style.width = Math.random() * 8 + 4 + 'px';
   confetti.style.height = confetti.style.width;
   document.body.appendChild(confetti);

  
   confetti.addEventListener('animationend', () => {
     confetti.remove();
   });
 }


 setInterval(createConfetti, 300);


 document.getElementById('cake').addEventListener('click', function() {
   const candles = document.getElementById('candles');
   const msg = document.getElementById('personalMsg');

   candles.style.opacity = '0';
   msg.style.transition = 'opacity 0.5s, transform 0.5s';
   msg.style.opacity = '0';
   msg.style.transform = 'translateY(20px)';

   setTimeout(() => {

     candles.innerHTML = 'xxxxxxxx';
     candles.style.color = '#fff';
     candles.style.opacity = '1';

     msg.innerHTML = '';
     msg.style.padding = '0';
     msg.style.margin = '0';
     msg.style.background = 'transparent';
     msg.style.boxShadow = 'none';
     msg.style.transform = 'translateY(0)';
   }, 500);
});




 
 const urlParams = new URLSearchParams(window.location.search);
 const name = urlParams.get('name');
 if (name) {
   document.getElementById('personalMsg').innerHTML =
     `亲爱的 <strong>${name}</strong>，<br>xxxxxx<br>xxxxx<br>  xxxxxx`;
 }
</script>
</body>
</html>
